name: Quiz Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate-build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Verify index.html Exists
        run: test -f index.html

      - name: Verify README Exists
        run: test -f README.md

      - name: Verify JS Folder Exists
        run: test -d JS

      - name: Verify Pages Folder Exists
        run: test -d pages

      - name: Verify Styles Folder Exists
        run: test -d styles

      - name: Verify Resources Folder Exists
        run: test -d resources

      - name: Build Docker Image
        run: |
          docker build -t simple-quiz-devops:${{ github.sha }} .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        if: github.event_name == 'push'
        run: |
          docker tag simple-quiz-devops:${{ github.sha }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest

      - name: Push Docker Image
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest

      - name: Pipeline Completed
        run: echo "Validation, build, and Docker Hub publishing completed successfully"