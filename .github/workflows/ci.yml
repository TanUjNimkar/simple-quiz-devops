name: Quiz Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: List Repository Files
        run: ls -la

      - name: Verify index.html Exists
        run: test -f index.html

      - name: Verify README Exists
        run: test -f README.md

      - name: Verify JS Folder Exists
        run: test -d JS

      - name: Verify Pages Folder Exists
        run: test -d pages

      - name: Verify Styles Folder Exists
        run: test -d styles

      - name: Verify Resources Folder Exists
        run: test -d resources

      - name: Validation Complete
        run: echo "Project structure validation completed successfully"