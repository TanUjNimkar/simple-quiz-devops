name: Quiz Application CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Verify index.html Exists
        run: test -f index.html

      - name: Verify README Exists
        run: test -f README.md

      - name: Verify JS Folder Exists
        run: test -d JS

      - name: Verify Pages Folder Exists
        run: test -d pages

      - name: Verify Styles Folder Exists
        run: test -d styles

      - name: Verify Resources Folder Exists
        run: test -d resources

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest .

      - name: Push Docker Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push'

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest

            docker stop simple-quiz || true
            docker rm simple-quiz || true

            docker run -d \
              --name simple-quiz \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/simple-quiz-devops:latest